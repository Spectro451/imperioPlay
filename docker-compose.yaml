services:
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3001:3001"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - back-tier
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - back-tier
  db:
    image: postgres:17-alpine
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0403"
      POSTGRES_DB: imperioplay
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - back-tier
volumes:
  db-data:
networks:
  back-tier: {}
